<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.2/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-base-200 min-h-screen p-4">
    <h1 class="text-2xl font-bold">Job Application Tracker</h1>
    <br>

    <!-- dashboard section -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="stat bg-base-100 shadow">
            <div class="stat-title">Total Jobs</div>
            <div id="totalCount" class="stat-value">0</div>
        </div>

        <div class="stat bg-base-100 shadow">
            <div class="stat-title">Interview</div>
            <div id="interviewCount" class="stat-value text-success">0</div>
        </div>

        <div class="stat bg-base-100 shadow">
            <div class="stat-title">Rejected</div>
            <div id="rejectedCount" class="stat-value text-error">0</div>
        </div>
    </section>

    <div class="w-full h-px bg-base-300 my-6"></div>

    <!-- Available jobs section -->
    <section class="bg-base-100 p-4 rounded-lg shadow">

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold">Available Jobs</h2>
            <span id="tabCount" class="badge badge-neutral">0 Jobs</span>
        </div>

        <div class="tabs tabs-boxed mb-4">
            <a class="tab tab-btn tab-active" onclick="changeTab('all')">All</a>
            <a class="tab tab-btn" onclick="changeTab('interview')">Interview</a>
            <a class="tab tab-btn" onclick="changeTab('rejected')">Rejected</a>
        </div>

        <div id="jobsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4"></div>

    </section>

    <script src="./js/main.js"></script>
</body>

</html>
